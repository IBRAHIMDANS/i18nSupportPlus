name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version à releaser (ex: 1.0.7)'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Bump pluginVersion in gradle.properties
        run: sed -i "s/^pluginVersion = .*/pluginVersion = ${{ inputs.version }}/" gradle.properties

      - name: Patch CHANGELOG (Unreleased → version)
        run: ./gradlew patchChangelog

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          BRANCH="chore/release-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add gradle.properties CHANGELOG.md
          git commit -m "chore(release): bump version to ${VERSION}"
          git push origin "$BRANCH"
          printf '## Release %s\n\nChangements automatisés :\n- `pluginVersion` mis à jour dans `gradle.properties`\n- `[Unreleased]` promu en `[%s]` dans `CHANGELOG.md`\n- Nouveau `[Unreleased]` vide créé pour la prochaine itération\n\n**Après merge :** créer le tag `v%s` pour déclencher la publication.' \
            "${VERSION}" "${VERSION}" "${VERSION}" > /tmp/pr-body.md
          gh pr create \
            --title "chore(release): bump version to ${VERSION}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"

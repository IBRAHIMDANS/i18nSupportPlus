name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be closed in 14 days unless there is new activity.
            If this is still relevant, please leave a comment or remove the `stale` label.
          stale-pr-message: |
            This pull request has been inactive for 45 days. It will be closed in 14 days unless there is new activity.
            If you're still working on this, please leave a comment or push a new commit.
          close-issue-message: |
            This issue was closed due to inactivity. Feel free to reopen it if it is still relevant.
          close-pr-message: |
            This pull request was closed due to inactivity. Feel free to reopen it if you'd like to continue working on it.

          days-before-stale: 60
          days-before-close: 14
          days-before-pr-stale: 45
          days-before-pr-close: 14

          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,roadmap'
          exempt-pr-labels: 'pinned,work-in-progress'
          exempt-all-milestones: true
